name: Sync to GitHub Project

on:
  push:
    branches: [main, master]

jobs:
  sync-to-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse commit message for project tags
        id: parse
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "=== Commit Message ==="
          echo "$COMMIT_MSG"
          echo "====================="

          # Extract [project:card=X]
          if CARD=$(echo "$COMMIT_MSG" | grep -oP '\[project:card=\K[^\]]+' | head -1); then
            echo "card<<EOF" >> $GITHUB_OUTPUT
            echo "$CARD" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "::notice::Found card reference: $CARD"
          fi

          # Extract [project:status=X]
          if STATUS=$(echo "$COMMIT_MSG" | grep -oP '\[project:status=\K[^\]]+' | head -1); then
            echo "status<<EOF" >> $GITHUB_OUTPUT
            echo "$STATUS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "::notice::Found status: $STATUS"
          fi

          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update project card
        if: steps.parse.outputs.card && steps.parse.outputs.status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          CARD_TITLE="${{ steps.parse.outputs.card }}"
          STATUS="${{ steps.parse.outputs.status }}"
          COMMIT_SHA="${{ steps.parse.outputs.sha }}"

          echo "Updating Project Card"
          echo "Card: $CARD_TITLE"
          echo "Status: $STATUS"

          # Project constants
          PROJECT_ID="PVT_kwHOAAzv8s4BOrDu"
          STATUS_FIELD_ID="PVTSSF_lAHOAAzv8s4BOrDuzg9Tg9U"

          # Map status to option ID
          case "$STATUS" in
            "Todo")
              STATUS_OPTION_ID="f75ad846"
              ;;
            "In Progress")
              STATUS_OPTION_ID="47fc9ee4"
              ;;
            "Done"|"Completed")
              STATUS_OPTION_ID="98236657"
              ;;
            *)
              echo "::warning::Unknown status: $STATUS"
              STATUS_OPTION_ID=""
              ;;
          esac

          # Find the item by title
          ITEM_DATA=$(gh api graphql -f query='
            query {
              user(login: "topkara") {
                projectV2(number: 5) {
                  items(first: 50) {
                    nodes {
                      id
                      content {
                        ... on DraftIssue {
                          title
                        }
                      }
                    }
                  }
                }
              }
            }')

          ITEM_ID=$(echo "$ITEM_DATA" | jq -r --arg title "$CARD_TITLE" \
            '.data.user.projectV2.items.nodes[] | select(.content.title == $title) | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "::error::Card not found: $CARD_TITLE"
            exit 1
          fi

          echo "Found item ID: $ITEM_ID"

          # Update status if provided
          if [ -n "$STATUS_OPTION_ID" ]; then
            echo "Updating status to: $STATUS"

            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {
                    singleSelectOptionId: $value
                  }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }' \
              -f project="$PROJECT_ID" \
              -f item="$ITEM_ID" \
              -f field="$STATUS_FIELD_ID" \
              -f value="$STATUS_OPTION_ID"

            echo "Status updated successfully!"
          fi

          echo ""
          echo "Commit: https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"
          echo "Project: https://github.com/users/topkara/projects/5"
